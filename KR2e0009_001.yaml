body:
  text: 五代史闕文宋王禹偁撰梁史三篇梁太祖世傳梁太祖迎昭宗于鳯翔素服待辠昭宗佯為鞵系脱呼梁祖曰全忠為吾繋鞵梁祖不得已跪而結之流汗浹背時天子扈蹕尚有衛兵昭宗意謂左右擒梁祖以殺之其如無敢動者自是梁祖被召多不至盡去昭宗禁衛皆用汴人矣臣謹按梁祖以天復三年迎唐昭宗于岐下嵗在甲子其年改天祐至國初建隆庚申嵗纔厯六十年矣然則乾徳七十嵗人皆目覩其事葢唐室自懿宗失政天下亂離故武宗已下實録不傳于世昭宗一朝全無記注梁祖在位止及六年均王朝詔史臣修梁祖實録岐下繋鞵之事恥而不書晉天福中史臣張昭重修唐史始有昭宗本紀但云即位之始有㑹昌之風岐陽事迹不能追補此亦明唐昭宗有英睿之氣而衰運不振又明左右無忠義奮發之臣致梁祖得行其志有所警誡不可不書廣王全昱全昱梁祖之兄也既受禪宫中閒燕惟親王得與因為博戲全昱酒酣忽起取骰子撃盆迸散大呼梁祖曰朱三汝碭山一民因天下饑荒入黄巢作賊天子用汝為四鎮節度使富貴足矣何故滅他李家三百年社稷稱王稱朕我不忍見汝血吾族矣安用博為梁祖不悦而罷臣謹按梁史叙廣王全昱𫝊曰昱朴野常呼帝為三宫中博戲之事諱之夫梁祖弑二君昭宗濟隂王弑一皇后何皇后名臣被害者不可勝紀及莊宗入汴盡誅朱氏惟全昱先令終至道初知單州有稱廣王之後與尼訟田宅者豈以一言之善獨存其嗣耶司空圗圖字表聖自言泗州人少有俊才咸通中一舉登進士第雅好為文躁于進取頗自矜伐端士鄙之初從事使府洎登朝驟厯清要巢賊之亂車駕播遷圖有先人舊業在中條山極林泉之美圖自禮部員外郎因避地焉日以詩酒自娱屬天下版蕩士人多往依之互相推奬由是聲名藉甚昭宗反正以戸部侍郎徴至京師圖既負才慢世謂已當為宰輔時要惡之稍抑其鋭圖憤憤謝病復歸中條與人書䟽不名官位但稱知非子又稱不辱居士其所居曰禎貽谿谿上結茅屋命曰休休亭常自為亭記云已上梁史舊文臣謹按圖河中虞鄉人少有文彩未為鄉里所稱㑹王凝自尚書郎出為絳州刺史圖以文謁之大為凝所賞歎由是知名未幾凝入知制誥遷中書舍人知貢舉擢圖上第頃之凝出為宣州觀察使辟圖為從事既渡江御史府奏圖監察下詔追之圖感凝知己之恩不忍輕離幕府滿百日不赴闕為臺司所劾遂以本官分司乆之徴拜禮部員外郎俄知制誥故集中有文曰戀恩稽命㸃繋洛師于今十年方叅綸閣此豈躁于進取者耶舊史不詳一至于是圖見唐政多僻中官用事知天下必亂即棄官歸中條山尋以中書舍人徴又拜禮部户部侍郎皆不起及昭宗播遷華下圖以宻邇乘輿即時奔問復辭還山故詩曰多病形容五十三誰憐借笏趨朝參此豈有意乎相位耶河中節度使王重榮請圖撰碑得絹數千匹圗致于虞鄉市心恣鄉人所取一日而盡是時盗賊充斥獨不入王官谷河中士人依圖避難獲全者甚衆昭宗東遷又以兵部侍郎召至洛下為栁璨所阻一謝而退梁祖受禪以禮部尚書徴辭以老病卒時年八十餘臣又按梁室大臣如恭本字犯廟諱翔李振杜曉楊涉等皆唐朝舊族本以忠義立身重侯累將三百餘年一旦委質朱梁其甚者贊成弑逆惟圖以清直避世終身不仕梁祖故梁史指圗小瑕以泯大節者良有以也後唐史七篇武皇世𫝊武皇臨薨終于晉王不登尊位故不言崩以三矢付莊宗曰一矢討劉仁恭汝不先下幽州河南未可圖也一矢撃契丹且曰安巴堅與我把臂而盟結為兄弟誓復唐家社稷今背約附賊汝必伐之一矢滅朱温汝能成吾志死無恨矣莊宗蔵三矢于武皇廟庭及討劉仁恭命幕吏以少牢告廟請一矢盛以錦囊使親將負之以為前驅凱還之日隨俘馘納矢于太廟伐契丹滅朱氏亦如之又武皇眇一目世謂之獨眼龍性喜殺左右小有過失必寘于死初諱眇人無敢犯者嘗令冩真畵工即為撚箭之狀微瞑一目圗成而進武皇大悦賜與甚厚莊宗莊宗嘗因博戲覩骰子采有暗相輪者心悦之乃自製暗箭格凡博戲並認采之在下者及同光末鄴都兵亂從謙以兵犯興教門莊宗禦之中流矢而崩識者以為暗箭之應張承業莊宗將即位于魏州承業自太原至謂莊宗曰吾王世奉唐家最為忠孝自貞觀以來王室有難未嘗不從所以老奴三十餘年為我王攟拾財賦召補軍馬者誓滅逆賊朱温復本朝宗社耳今河朔甫定朱氏尚存吾王遽即大位可乎云云其下事具莊宗實録莊宗曰奈諸將意何承業知不可諌止乃慟哭曰諸侯血戰者本為李家今吾王自取之誤老奴矣即歸太原不食而死臣謹按莊宗實録叙承業諌即位事甚詳惟我王自取之言不書史官諱之也張全義唐昭宗賜梁祖名全忠賜張言名全義入梁改名宋奭梁乾化元年七月辛丑梁祖幸全義私第甲辰歸大内梁史稱上不豫厭秋暑幸宋奭私第數日宰臣視事于仁岐亭崇政使梁改樞宻為崇政諸司並止于河南令廨署世𫝊梁祖亂全義家婦女悉皆進御其子繼祚不勝憤憤欲剚刄于梁祖全義止之曰吾頃在河陽遭李罕之之難引太原軍圍閉經年㗖木屑以度朝夕死在頃刻得他他謂梁祖救援以至今日此恩不可負也其子乃止梁史云云者諱國惡也臣謹按春秋莊二年經曰十有二月夫人姜氏㑹齊侯于禚𫝊曰書姦也夫經言㑹者諱惡禮也𫝊曰姦者暴其罪以垂誡也又莊二十二年𫝊書齊陳完飲桓公酒公曰以火繼之辭曰臣卜其晝未卜其夜豈有天子幸人臣之家留止數曰姦亂明矣况全義本出巢賊敗依河陽節度使諸葛爽爽用為澤州刺史及爽死全義事爽子仲方即與李罕之同逐仲方罕之帥河陽全義為河南尹未幾又逐罕之自據河陽其翻覆也如此自是託迹朱梁斲喪唐室惟勤勸課其實歛民附賊以固恩寵梁時月進鎧馬以補軍實及梁祖為友珪所弑首進錢一百萬以助山陵莊宗平中原全義令與恭翔李振等族誅又通賂與劉皇后仍請莊宗幸洛言臣已有郊天費用夫全義匹夫也豈能自殖財賦其剥下奉上也又如此晩年保證明宗欲為子孫之福師方渡河鄴都兵亂全義憂恨不食終以餓死未死前其子繼業訟弟汝州防禦使繼孫莊宗貶房州司户賜自盡其制畧曰侵奪父權惑亂家事縱鳥獸之行畜梟獍之心其御家無法也又如此河南令羅貫方正文章之士事全義稍慢全義怒告劉皇后斃貫于枯木之下朝野寃之洛陽監軍使常收得李太尉平泉醒酒石全義求之監軍不與全義立殺之其附勢作威也又如此斯葢亂世之賊臣耳得保首領為幸則多晉天福中其子繼祚謀反伏誅識者知餘殃在其子孫也臣讀莊宗實録見史官叙全義𫝊虚美尤甚至今負俗無識之士尚以全義為名臣故因補闕文粗論事迹云明宗明宗出自沙陀老于戰陳即位之嵗年已六旬純厚仁慈本乎天性每夕宫中焚香仰天禱祝云某蕃人也遇世亂為衆推戴事不獲已願上天早生聖人與百姓為主故天成長興間比嵗豐登中原無事言于五代粗為小康安重誨明宗令瞿光鄴李從璋誅重誨于河中私弟從璋奮檛撃重誨于地重誨曰某死無恨但不與官家誅得潞王他日必為朝廷之患言終而絶臣謹按明宗實録是清泰帝朝修撰潞王即清泰帝也史臣諱避不敢直書嗚呼重誨之志節泯矣清泰帝晉髙祖引契丹圍晉安寨降楊光逺清泰帝至自懐覃京師父老迎帝于上東門外帝垂泣不止父老奏曰臣等伏聞前唐時中國有難帝王多幸蜀以圖進取陛下何不且入西川帝曰本朝兩川節度使皆用文臣所以𤣥宗僖宗避冦幸蜀今孟氏已稱尊矣我何歸乎因慟哭入内舉族自焚晉史一篇晉髙祖梁開平初潞州行營使李思安奏壺闗縣壤鄉民伐樹樹仆自分為二中有六字如左書云天十四載石進梁帝蔵于武庫時莫詳其義至晉帝即位識者曰天字取四字兩畫加之于傍即丙字也四字去中之兩畫加十即申字也帝即位之年乃丙申也進者晉也石者姓也已上晉史舊云臣謹按天祐二十年嵗在癸未其年莊宗建號改同光元年至清泰三年嵗在丙申其年晉祖即位改元天福元年自未至申凡十四載矣故䜟書云天十四載石進者言自天祐滅後十四載石氏興于晉也豈不明乎而拆字解䜟以就丙申非也漢史二篇王淑妃許王從益王淑妃明宗妃也從益明宗㓜子也而見于漢史者為漢祖所殺故也漢髙祖自太原起軍建號至洛陽命郭從義先入京師受宻㫖殺王淑妃與許王從益淑妃臨刑號泣曰吾家子母何罪吾兒為契丹所立非敢與人争國何不且留我兒每年寒食使持一盂飯灑明宗陵寢聞者無不泣下臣謹按𨼆帝朝詔史臣修漢祖實録叙淑妃從益𫝊但云臨刑之日焚香俟命葢諱之耳劉洙漢𨼆帝朝洙為開封尹周祖自鄴起兵洙盡誅周祖之家今皇建院即周祖家子孫婦女十數人極其惨毒及𨼆帝遇害周祖以漢太后令收洙下獄使人責之語在漢史洙對曰某為漢家戮叛族耳不知其他周祖怒遂殺之臣謹按周世宗朝史官修漢𨼆帝實録洙之忠言諱而不載洙今有子季和擢進士第周史四篇周太祖馮道事迹相因故君臣同序周太祖在漢𨼆帝朝為樞宻使將兵伐河中李守貞時馮道守太師不與朝政以疾請告周祖謁道于私第問伐蒲䇿道辭以不在其位不敢議國事周祖固問之道不得已謂周祖曰相公頗知博乎時周祖始兼平章事周祖微時好蒱博屢以此抵罪疑道譏已勃然變色道曰是行亦猶博也夫博財多者氣豪而勝財寡者心怯而輸守貞在晉累典禁兵自為軍情附已遂謀反耳今相公誠能不惜官錢廣施恩愛明其賞罰使軍心許國則守貞不足慮也周祖曰恭聞命矣故伐蒲之役周祖以便宜從事率成大功然亦軍旅歸心終移漢祚又周祖自鄴起兵赴闕漢𨼆帝兵敗遇害于劉子陂周祖入京師百官謁周祖見道猶設拜意道便行推戴道受拜如平時徐曰侍中此行不易時周祖兼侍中周祖氣沮故禪代之謀稍緩及請道詣徐州冊湘隂公為漢嗣道曰侍中由衷乎周祖設誓道曰莫教老夫為繆語令為繆語人臣謹按周世宗朝詔史臣修周祖實録故道之事所宜諱矣王峻廣順初河東劉崇引契丹攻晉州遣峻率師赴援峻頓兵于陜周祖欲親征遣使諭之使即故商州團練使羅守素也嘗與臣言已下事迹峻見使受宣訖時惟𫝊口宣無詔書謂使曰與某馳還附奏陛下謂周祖也言晉州城堅未易可㧞劉崇兵鋒方鋭不可與力爭所以駐兵者待其氣衰耳非臣怯也陛下新即位不宜輕舉今朝中受聖知者惟李榖范質而已陛下若車駕出汜水則慕容彦超以賊軍入汴大事去矣時彦超據兖州叛使還具奏周祖自以手提耳目使者曰幾敗吾事世宗符皇后符后先適河中節度使李守貞之子崇訓守貞嘗得術士善聽聲知人貴賤守貞舉族悉令術士聽之獨言后大貴當母儀天下守貞信之因曰吾婦尚為皇后我可知也遂謀叛及城陷后獨免周祖為世宗娶之顯徳中冊為后臣以為術士之言葢亦有時而中人君之位安可無妄而求公侯其誡之王朴周顯徳中朴與魏仁浦俱為樞宻使時太祖皇帝已掌禁兵一日有殿直乘馬誤衝太祖道從太祖自詣宻地訴其無禮仁浦令宣徽院勘詰朴謂太祖曰太尉時太祖撿校太尉名位雖髙未加使相殿直廷臣也與太尉比肩事主太尉况帶軍職不宜如此太祖唯唯而出臣謹按朴之行事𫝊于人口者甚衆而史氏闕書臣昨重修太祖實録已于李榖傳中見朴遺事今復補其大者况太祖太宗在位每稱朴有公輔之器朝列具聞五代史闕文
