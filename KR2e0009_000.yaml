body:
  text: 五代史闕文雜史類提要臣等謹案五代史闕文一卷宋王禹稱撰禹稱字元之巨野人太平興國八年進士官至知黃州事蹟具宋史本傳是書前有自序不著年月考書中周世宗遣使諭王峻一條自注云使即故商州團練使羅守數也嘗與臣言以下事迹是在由左司諫謫商州團練副使以後其結銜稱翰林學士則作於真宗之初是時薛居正等五代史已成疑作此以補其缺然居正等書凡一百五十卷而序稱臣讀五代史總三百六十卷則似非指居正等所修也朝公武讀書志曰凡十七事此本梁史三事後唐史七事晉史一事漢史二事周史四事典朝氏所記合蓋猶舊本王士禎香祖筆記曰王元之五代史闕文僅一卷而辨正精嚴足正史官之謬如辨司空圖清直大節一段尤萬古公論所繫非眇小也如叙莊宗三矢告廟一段文字淋漓慷慨足為武皇父子寫生歐陽五代史伶官𫝊全用之遂成絶調惟以張全義為亂世賊臣深合春秋之義而歐陽不取於全義𫝊略無貶詞蓋即舊史以成文耳終常以元之為定論也云云其推挹頗深今考五代史於朱全昱張承業王淑妃許王從益周世宗符皇后諸條亦多採此書而新唐書司空圖𫝊即全據禹稱之說則雖篇帙寥寥當時固以信史視之矣乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀五代史闕文序嗚呼五代何時也天地晦冥之時也綱常頽替風俗陵夷孟子所謂上無道揆下無法守此時為特近之故朝為君臣暮為仇敵帝統之嗣如𫝊舍然無逸所謂或四三年或五六年亦其實也以故當時史無定官官無定守兼之兵革迭興文字亦略其間故典或諱於勢或闕于疑或淪于幽不知其凡幾矣識者不能無遺憾焉有宋王元之氏乃能網羅放失顯微闡幽作為闕文一書為史凡十七篇於六一深為有助余常得之故篋深嘉歎賞慨其刻之久湮也敬梓之以𫝊若夫關氣運之盛衰論人事之得失則自有全史在此特其羽翼云參南京後府諸軍事錫山後學秦汴序五代史闕文原序臣讀五代史總三百六十卷記五十三年行事其書固亦多矣然自梁至周君臣事迹傳于人口而不載史筆者往往有之或史氏避嫌或簡牘漏略不有紀述漸成泯滅善惡鑒誡豈不廢乎因補一十七篇集為一卷皆聞於耆老者也孔子曰吾述而不作又曰我猶及史之闕文此其義也宋翰林學士王禹稱撰進
